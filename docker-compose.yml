version: "3.9"

services:
  # ── Reverse Proxy ──────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - frontend_static:/usr/share/nginx/static:ro
    depends_on:
      web:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app_net

  # ── Backend API ────────────────────────────────────────────
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_net

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    expose:
      - "3000"
    volumes:
      - frontend_static:/app/.next/static
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_net

  # ── Database ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tournament}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tournament}
      POSTGRES_DB: ${POSTGRES_DB:-tournament_hub}
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tournament}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app_net

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app_net

  # ── Database Migrations ────────────────────────────────────
  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

  # ── Background Worker ──────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - app_net

  # ── Periodic Scheduler ─────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.scheduler"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - app_net

volumes:
  db_data:
  certbot_certs:
  frontend_static:
  avatars:

networks:
  app_net:
    driver: bridge
